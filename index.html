<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#0066FF" />
    <meta name="description" content="RideHub - Your go-to taxi service" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css' rel='stylesheet' />
    <title>Wana2</title>
    <style>
      .app-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0066FF;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      .app-loading.loaded {
        opacity: 0;
        pointer-events: none;
      }
      .app-loading-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s linear infinite;
      }
      .app-loading-text {
        margin-top: 16px;
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 16px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="h-full">
    <div id="app-loading" class="app-loading">
      <div class="app-loading-spinner"></div>
    </div>
    <div id="root" class="h-full"></div>
    <script>
      window.addEventListener('load', function() {
        // Give a small delay to ensure React has started rendering
        setTimeout(function() {
          document.getElementById('app-loading').classList.add('loaded');
          // Remove the loader from DOM after transition
          setTimeout(function() {
            document.getElementById('app-loading').remove();
          }, 300);
        }, 500);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
